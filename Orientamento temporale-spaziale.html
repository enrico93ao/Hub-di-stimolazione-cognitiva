<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mente Attiva - Orientamento Cognitivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background-color: #f1f5f9;
            user-select: none;
            touch-action: manipulation;
            font-size: 1.3rem;
        }
        .drag-item {
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.3s, border-color 0.3s;
            touch-action: none;
        }
        .drag-item:active {
            cursor: grabbing;
            transform: scale(1.05);
        }
        .slot {
            min-height: 120px;
            border: 4px dashed #94a3b8;
            transition: all 0.3s ease;
            background-color: #ffffff;
        }
        .slot.correct {
            border-style: solid;
            border-color: #16a34a;
            background-color: #f0fdf4;
            animation: pop 0.3s ease-out;
        }
        .slot.active-target {
            border-color: #2563eb;
            background-color: #eff6ff;
            box-shadow: 0 0 15px rgba(37, 99, 235, 0.4);
            animation: pulse-border 1.5s infinite;
        }
        .slot.active-super-target {
            border-color: #d97706;
            background-color: #fffbeb;
            box-shadow: 0 0 20px rgba(217, 119, 6, 0.5);
            animation: pulse-super-border 1.5s infinite;
        }
        .correct-super-tile {
            border-color: #d97706 !important;
            background-color: #fef3c7 !important;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.4);
            animation: pulse-tile 1.5s infinite;
        }
        @keyframes pulse-border {
            0%, 100% { transform: scale(1); border-color: #2563eb; }
            50% { transform: scale(1.02); border-color: #60a5fa; }
        }
        @keyframes pulse-super-border {
            0%, 100% { transform: scale(1); border-color: #d97706; }
            50% { transform: scale(1.03); border-color: #fbbf24; }
        }
        @keyframes pulse-tile {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        @keyframes pop {
            0% { transform: scale(0.9); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .active-label {
            color: #2563eb;
            font-weight: 800;
            animation: bounce-text 1.5s infinite;
        }
        .active-super-label {
            color: #d97706;
            font-weight: 800;
            animation: bounce-text 1.5s infinite;
        }
        @keyframes bounce-text {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }
        .error-shake {
            animation: shake 0.4s;
            border-color: #ef4444 !important;
            background-color: #fee2e2 !important;
            color: #b91c1c !important;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .correct-text {
            color: #16a34a;
            font-weight: 800;
            font-size: 1.6rem;
            text-transform: uppercase;
        }
        .btn-large {
            transition: all 0.2s;
            border-bottom-width: 6px;
        }
        .btn-large:active {
            border-bottom-width: 2px;
            transform: translateY(4px);
        }
        .hint-date-box {
            background-color: #fef3c7;
            border: 4px solid #f59e0b;
            color: #92400e;
        }
        .modal-overlay {
            background-color: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col text-slate-900">

    <header class="bg-indigo-700 text-white p-4 md:p-5 shadow-xl text-center z-10">
        <div class="flex justify-between items-center max-w-6xl mx-auto">
            <div class="flex gap-2">
                <button onclick="resetApp()" class="bg-indigo-800 hover:bg-indigo-950 px-4 py-3 rounded-2xl text-sm font-bold border-b-4 border-indigo-950 flex items-center justify-center gap-2">
                    🏠 <span class="uppercase">Menu</span>
                </button>
                <button onclick="toggleSettings(true)" class="bg-slate-800 hover:bg-slate-950 px-4 py-3 rounded-2xl text-sm font-bold border-b-4 border-slate-950 flex items-center justify-center gap-2 text-amber-400">
                    ⚙️ <span class="hidden sm:inline uppercase text-white">Impostazioni</span>
                </button>
            </div>
            <div>
                <h1 class="text-2xl md:text-3xl font-extrabold tracking-tight uppercase">Mente Attiva</h1>
            </div>
            <div class="text-right text-xs opacity-90 hidden md:block bg-indigo-900 px-3 py-2 rounded-xl">
                <span id="header-location">📍 Rilevamento posizione...</span>
            </div> 
        </div>
    </header>

    <div id="sync-indicator" class="bg-amber-100 text-amber-800 text-xs text-center py-1 font-bold border-b border-amber-200">
        Sincronizzazione database in corso...
    </div>

    <main id="app-container" class="flex-grow p-4 md:p-8 max-w-6xl mx-auto w-full flex flex-col justify-center">
        <!-- Contenuto dinamico inserito via JS -->
    </main>

    <!-- Modal Impostazioni Caregiver -->
    <div id="settings-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 modal-overlay">
        <div class="bg-white rounded-[2.5rem] max-w-lg w-full p-6 md:p-8 shadow-2xl border-4 border-indigo-600">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black text-indigo-900 uppercase">⚙️ Gestione Caregiver</h3>
                <button onclick="toggleSettings(false)" class="text-slate-400 hover:text-slate-600 text-3xl font-bold">&times;</button>
            </div>
            
            <p class="text-sm text-slate-500 mb-6">Usa questo pannello per allineare l'applicazione con la reale data e posizione del paziente.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Città Corrente del Paziente</label>
                    <input type="text" id="setting-city" class="w-full p-3 border-2 border-slate-300 rounded-xl font-bold uppercase focus:border-indigo-500 outline-none text-base">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Data Corrente</label>
                    <input type="date" id="setting-date" class="w-full p-3 border-2 border-slate-300 rounded-xl font-bold focus:border-indigo-500 outline-none text-base">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-1">Stagione Attuale</label>
                    <select id="setting-season" class="w-full p-3 border-2 border-slate-300 rounded-xl font-bold focus:border-indigo-500 outline-none text-base">
                        <option value="primavera">Primavera 🌸</option>
                        <option value="estate">Estate ☀️</option>
                        <option value="autunno">Autunno 🍂</option>
                        <option value="inverno">Inverno ❄️</option>
                    </select>
                </div>
            </div>

            <div class="flex gap-4 mt-8">
                <button onclick="toggleSettings(false)" class="flex-1 bg-slate-200 hover:bg-slate-300 py-4 rounded-2xl font-bold text-slate-700 text-sm uppercase">
                    Annulla
                </button>
                <button onclick="saveSettings()" class="flex-1 bg-indigo-600 hover:bg-indigo-700 py-4 rounded-2xl font-bold text-white text-sm uppercase border-b-4 border-indigo-900">
                    Salva e Applica
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, addDoc, updateDoc, collection, query, getDocs, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseApp = null;
        window.db = null;
        window.auth = null;
        window.arrayUnion = arrayUnion;
        window.updateDoc = updateDoc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.doc = doc;
        window.collection = collection;
        window.addDoc = addDoc;
        window.getDocs = getDocs;
        window.query = query;

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        window.dbReady = false;
        window.currentUser = null;

        const indicator = document.getElementById('sync-indicator');

        async function initFirebase() {
            if (!firebaseConfig) {
                if (indicator) {
                    indicator.textContent = "Sincronizzazione Database disattivata (Configurazione assente)";
                    indicator.className = "bg-slate-200 text-slate-600 text-xs text-center py-1 font-bold";
                }
                return;
            }

            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                window.firebaseApp = app;
                window.auth = auth;
                window.db = db;

                let userCredential;
                if (initialAuthToken) {
                    userCredential = await signInWithCustomToken(auth, initialAuthToken);
                } else {
                    userCredential = await signInAnonymously(auth);
                }

                window.currentUser = userCredential.user;
                window.dbReady = true;

                if (indicator) {
                    indicator.textContent = `Sincronizzato con il database (Utente: ${window.currentUser.uid})`;
                    indicator.className = "bg-green-100 text-green-800 text-xs text-center py-1 font-bold border-b border-green-200";
                }
            } catch (error) {
                console.error("Inizializzazione Firebase fallita:", error);
                if (indicator) {
                    indicator.textContent = "Modalità Offline attiva (Salvataggio locale pronto).";
                    indicator.className = "bg-red-100 text-red-800 text-xs text-center py-1 font-bold border-b border-red-200";
                }
            }
        }

        window.addEventListener('load', () => {
            initFirebase();
        });
    </script>

    <script>
        const state = {
            step: 'difficulty', 
            difficulty: 'base',
            showHint: true,
            showSettings: false,
            referenceDate: new Date(), 
            customCity: 'Aosta',        
            customSeason: null,        
            answers: { weekday: null, day: null, month: null, year: null, season: null },
            metrics: {
                startTime: null,
                totalAttempts: 0
            },
            get activeSlotType() {
                const sequence = this.difficulty === 'super-easy' 
                    ? ['weekday', 'day', 'month', 'year'] 
                    : ['weekday', 'day', 'month', 'year', 'season'];
                return sequence.find(type => this.answers[type] === null);
            },
            get correctData() {
                const ref = this.referenceDate;
                return {
                    weekday: ref.toLocaleString('it-IT', { weekday: 'long' }).toLowerCase(),
                    day: ref.getDate().toString(),
                    month: ref.toLocaleString('it-IT', { month: 'long' }).toLowerCase(),
                    year: ref.getFullYear().toString(),
                    season: this.customSeason || getSeason(ref)
                };
            }
        };

        const seasonsIcons = {
            primavera: '🌸', estate: '☀️', autunno: '🍂', inverno: '❄️'
        };

        function getSeason(dateObj) {
            const month = dateObj.getMonth() + 1; 
            const day = dateObj.getDate();
            
            if ((month === 3 && day >= 21) || month === 4 || month === 5 || (month === 6 && day < 21)) {
                return 'primavera';
            }
            if ((month === 6 && day >= 21) || month === 7 || month === 8 || (month === 9 && day < 23)) {
                return 'estate';
            }
            if ((month === 9 && day >= 23) || month === 10 || month === 11 || (month === 12 && day < 22)) {
                return 'autunno';
            }
            return 'inverno';
        }

        async function detectLocation() {
            const headerLoc = document.getElementById('header-location');
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 3000); // Timeout di sicurezza a 3 secondi
                
                const response = await fetch('https://ipapi.co/json/', { signal: controller.signal });
                clearTimeout(timeoutId);

                if (response.ok) {
                    const data = await response.json();
                    if (data && data.city) {
                        state.customCity = data.city;
                        headerLoc.textContent = `📍 Posizione: ${data.city.toUpperCase()}`;
                        return;
                    }
                }
                throw new Error("Mancata risposta");
            } catch (e) {
                state.customCity = 'Aosta'; 
                headerLoc.textContent = `📍 Posizione: AOSTA`;
            }
        }

        function getTodayString() {
            const data = state.correctData;
            const isSuperEasy = state.difficulty === 'super-easy';
            
            const items = [
                { label: 'GIORNO SETT.', val: data.weekday },
                { label: 'NUMERO', val: data.day },
                { label: 'MESE', val: data.month },
                { label: 'ANNO', val: data.year }
            ];

            if (!isSuperEasy) {
                items.push({ label: 'STAGIONE', val: seasonsIcons[data.season] + " " + data.season });
            }

            return `
                <div class="flex flex-wrap justify-center gap-3 mt-2">
                    ${items.map(item => `
                        <div class="bg-white/95 px-5 py-3 rounded-2xl border-2 border-amber-500 min-w-[140px] shadow-md">
                            <span class="text-[11px] block opacity-80 font-black uppercase text-amber-800">${item.label}</span>
                            <span class="text-xl md:text-2xl font-black uppercase text-indigo-950">${item.val}</span>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function playSound(type) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                
                if (type === 'success') {
                    const tones = [523.25, 659.25, 783.99]; 
                    tones.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.08));
                        gain.gain.setValueAtTime(0.12, ctx.currentTime + (i * 0.08));
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.35 + (i * 0.08));
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(ctx.currentTime + (i * 0.08));
                        osc.stop(ctx.currentTime + 0.45 + (i * 0.08));
                    });
                } else if (type === 'error') {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(130, ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(80, ctx.currentTime + 0.3);
                    gain.gain.setValueAtTime(0.15, ctx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(); osc.stop(ctx.currentTime + 0.3);
                } else if (type === 'victory') {
                    const melody = [523.25, 587.33, 659.25, 783.99, 1046.50];
                    melody.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const gain = ctx.createGain();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + (i * 0.12));
                        gain.gain.setValueAtTime(0.08, ctx.currentTime + (i * 0.12));
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25 + (i * 0.12));
                        osc.connect(gain); gain.connect(ctx.destination);
                        osc.start(ctx.currentTime + (i * 0.12));
                        osc.stop(ctx.currentTime + 0.35 + (i * 0.12));
                    });
                }
            } catch(e) { console.error("Audio non supportato", e); }
        }

        function toggleSettings(show) {
            state.showSettings = show;
            const modal = document.getElementById('settings-modal');
            if (show) {
                document.getElementById('setting-city').value = state.customCity;
                const year = state.referenceDate.getFullYear();
                const month = String(state.referenceDate.getMonth() + 1).padStart(2, '0');
                const day = String(state.referenceDate.getDate()).padStart(2, '0');
                document.getElementById('setting-date').value = `${year}-${month}-${day}`;
                document.getElementById('setting-season').value = state.customSeason || getSeason(state.referenceDate);
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        function saveSettings() {
            const cityInput = document.getElementById('setting-city').value.trim();
            const dateInput = document.getElementById('setting-date').value;
            const seasonInput = document.getElementById('setting-season').value;

            if (cityInput) state.customCity = cityInput;
            if (dateInput) {
                state.referenceDate = new Date(dateInput + "T10:00:00");
            }
            state.customSeason = seasonInput;

            state.answers = { weekday: null, day: null, month: null, year: null, season: null };
            document.getElementById('header-location').textContent = `📍 Posizione: ${state.customCity.toUpperCase()}`;
            
            toggleSettings(false);
            render();
            playSound('success');
        }

        function render() {
            const container = document.getElementById('app-container');
            container.innerHTML = '';
            switch(state.step) {
                case 'difficulty': renderDifficulty(container); break;
                case 'temporal': renderTemporal(container); break;
                case 'spatial-city': renderSpatialCity(container); break;
                case 'spatial-room': renderSpatialRoom(container); break;
                case 'spatial-map': renderSpatialMap(container); break;
                case 'final': renderFinal(container); break;
            }
        }

        function renderDifficulty(container) {
            container.innerHTML = `
                <div class="text-center py-4">
                    <h2 class="text-3xl md:text-4xl font-extrabold mb-8 text-slate-800 uppercase">Seleziona il livello di gioco:</h2>
                    <div class="grid md:grid-cols-3 gap-6 max-w-5xl mx-auto px-4">
                        <button onclick="setDifficulty('super-easy')" class="btn-large bg-white border-pink-500 p-8 rounded-[2.5rem] shadow-lg hover:bg-pink-50 flex flex-col items-center">
                            <span class="text-6xl mb-4">🌸</span>
                            <span class="text-2xl font-black text-pink-700 uppercase">SUPER FACILE</span>
                            <p class="text-sm text-slate-600 mt-3 font-medium leading-relaxed">4 domande (Giorno, Numero, Mese, Anno). Nessun distrattore.</p>
                        </button>
                        <button onclick="setDifficulty('base')" class="btn-large bg-white border-green-600 p-8 rounded-[2.5rem] shadow-lg hover:bg-green-50 flex flex-col items-center">
                            <span class="text-6xl mb-4">⭐</span>
                            <span class="text-2xl font-black text-green-700 uppercase">BASE</span>
                            <p class="text-sm text-slate-600 mt-3 font-medium leading-relaxed">5 domande, 3 opzioni semplificate, evidenziazione blu.</p>
                        </button>
                        <button onclick="setDifficulty('advanced')" class="btn-large bg-white border-blue-600 p-8 rounded-[2.5rem] shadow-lg hover:bg-blue-50 flex flex-col items-center">
                            <span class="text-6xl mb-4">🏆</span>
                            <span class="text-2xl font-black text-blue-700 uppercase">SFIDA</span>
                            <p class="text-sm text-slate-600 mt-3 font-medium leading-relaxed">5 domande, 5 opzioni diverse, nessun aiuto visivo.</p>
                        </button>
                    </div>
                </div>
            `;
        }

        function setDifficulty(level) {
            state.difficulty = level;
            state.step = 'temporal';
            state.showHint = (level === 'super-easy' || level === 'base');
            state.metrics.startTime = Date.now();
            state.metrics.totalAttempts = 0;
            render();
        }

        function renderTemporal(container) {
            const data = state.correctData;
            let count = (state.difficulty === 'super-easy') ? 1 : ((state.difficulty === 'advanced') ? 5 : 3);

            const weekdayOptions = generateOptions(data.weekday, count, 'weekday').map(v => ({val: v, type: 'weekday'}));
            const dayOptions = generateOptions(data.day, count, 'number').map(v => ({val: v, type: 'day'}));
            const monthOptions = generateOptions(data.month, count, 'month').map(v => ({val: v, type: 'month'}));
            const yearOptions = generateOptions(data.year, count, 'year').map(v => ({val: v, type: 'year'}));
            
            const allSeasons = ['primavera', 'estate', 'autunno', 'inverno'];
            const selectedSeasons = (state.difficulty === 'super-easy' || state.difficulty === 'base')
                ? [data.season, ...allSeasons.filter(s => s !== data.season).slice(0, count - 1)]
                : allSeasons;
            const seasonOptions = selectedSeasons.map(v => ({val: v, type: 'season'}));

            let listToShuffle = (state.difficulty === 'super-easy') 
                ? [...weekdayOptions, ...dayOptions, ...monthOptions, ...yearOptions]
                : [...weekdayOptions, ...dayOptions, ...monthOptions, ...yearOptions, ...seasonOptions];

            const allDraggables = shuffle(listToShuffle);
            
            const sequence = state.difficulty === 'super-easy' 
                ? ['weekday', 'day', 'month', 'year'] 
                : ['weekday', 'day', 'month', 'year', 'season'];

            const labels = { weekday: 'Giorno Sett.', day: 'Numero', month: 'Mese', year: 'Anno', season: 'Stagione' };
            const activeSlotType = state.activeSlotType;

            container.innerHTML = `
                <div class="space-y-6">
                    <div class="flex flex-col sm:flex-row justify-between items-center bg-indigo-50 p-4 rounded-3xl border-2 border-indigo-200 gap-4">
                        <span class="font-black text-indigo-900 uppercase text-center sm:text-left">Componiamo la data di oggi:</span>
                        ${state.difficulty !== 'super-easy' ? `
                        <button onclick="toggleHint()" class="bg-white hover:bg-slate-100 text-indigo-700 px-6 py-2 rounded-xl text-sm font-black shadow-sm border-2 border-indigo-300 uppercase w-full sm:w-auto">
                            ${state.showHint ? '👁️ Nascondi Aiuto' : '👁️ Mostra Aiuto'}
                        </button>
                        ` : '<span class="text-xs bg-pink-200 text-pink-800 font-bold px-3 py-1 rounded-full uppercase">Aiuto Sempre Attivo 🌸</span>'}
                    </div>

                    <div id="hint-box" class="${state.showHint ? '' : 'hidden'} hint-date-box p-4 rounded-3xl text-center shadow-lg">
                        <span class="text-xs font-black uppercase opacity-75 block mb-1 tracking-widest">Guarda qui la data corretta di oggi:</span>
                        ${getTodayString()}
                    </div>

                    <div class="bg-white p-6 rounded-3xl border-4 border-slate-200 shadow-sm overflow-x-auto">
                        <div class="flex flex-nowrap md:grid ${state.difficulty === 'super-easy' ? 'md:grid-cols-4 max-w-4xl mx-auto' : 'md:grid-cols-5'} gap-3 min-w-[600px] md:min-w-0">
                            ${sequence.map(type => {
                                const isActive = type === activeSlotType;
                                const isCorrect = state.answers[type] !== null;
                                let activeClass = isActive ? (state.difficulty === 'super-easy' ? 'active-super-target' : 'active-target') : '';
                                let placeholderContent = '<span class="text-slate-300 font-bold uppercase text-[11px]">Seleziona</span>';
                                if (isActive && state.difficulty === 'super-easy') {
                                    placeholderContent = `<span class="text-amber-500/40 font-black uppercase text-sm">Cerca:<br>${state.correctData[type].toUpperCase()}</span>`;
                                }
                                return `
                                <div class="space-y-2 flex-1">
                                    <label class="text-xs font-black uppercase ml-2 block h-5 text-center ${isActive ? (state.difficulty === 'super-easy' ? 'active-super-label' : 'active-label') : 'text-slate-400'}">
                                        ${labels[type]} ${isActive ? '⚡' : ''}
                                    </label>
                                    <div id="slot-${type}" 
                                         class="slot w-full rounded-2xl flex flex-col items-center justify-center text-center p-3 ${activeClass} ${isCorrect ? 'correct' : ''}"
                                         ondrop="drop(event, '${type}')" 
                                         ondragover="allowDrop(event)">
                                        ${state.answers[type] ? `<span class="correct-text">${state.answers[type].toUpperCase()}</span>` : placeholderContent}
                                    </div>
                                </div>
                            `}).join('')}
                        </div>
                    </div>

                    <div class="bg-slate-200 p-6 rounded-[2.5rem] shadow-inner">
                        <p class="text-center text-slate-600 font-bold mb-4 uppercase text-sm">Tocca o trascina la tessera corretta:</p>
                        <div class="flex flex-wrap justify-center gap-3">
                            ${allDraggables.map((item, idx) => {
                                const val = item.val;
                                const type = item.type;
                                const isUsed = state.answers[type] === val;
                                let superEasyStyleClass = (state.difficulty === 'super-easy' && type === activeSlotType && val.toLowerCase() === state.correctData[type].toLowerCase()) ? 'correct-super-tile' : '';

                                return `
                                <div id="drag-${idx}" 
                                     draggable="true" 
                                     ondragstart="drag(event)" 
                                     onclick="handleSelection('${idx}', '${val.replace(/'/g, "\\'")}', '${type}')"
                                     data-value="${val}"
                                     data-type="${type}"
                                     style="${isUsed ? 'display:none' : ''}"
                                     class="drag-item ${superEasyStyleClass} bg-white border-4 border-slate-300 px-6 py-4 rounded-2xl text-xl font-black text-slate-800 shadow-md active:bg-indigo-100 uppercase select-none min-h-[60px] flex items-center justify-center">
                                    ${(state.difficulty !== 'advanced') && seasonsIcons[val.toLowerCase()] ? seasonsIcons[val.toLowerCase()] + ' ' : ''}${val}
                                </div>
                            `}).join('')}
                        </div>
                    </div>

                    <div id="temporal-next" class="${checkComplete() ? '' : 'hidden'} text-center mt-6">
                         <button onclick="state.step = 'spatial-city'; render();" class="btn-large bg-green-600 border-green-800 hover:bg-green-700 text-white px-12 py-5 rounded-full text-2xl font-black shadow-xl animate-bounce uppercase">
                            BRAVO! VAI AVANTI →
                         </button>
                    </div>
                </div>
            `;
        }

        function handleSelection(id, val, type) {
            state.metrics.totalAttempts++;
            const dragEl = document.getElementById(`drag-${id}`);
            const activeSlot = state.activeSlotType;
            const correctValue = state.correctData[type].toLowerCase();

            if (type !== activeSlot) {
                playSound('error');
                if(dragEl) { dragEl.classList.add('error-shake'); setTimeout(() => dragEl.classList.remove('error-shake'), 400); }
                return;
            }

            if (val.toLowerCase() === correctValue) {
                state.answers[type] = val;
                playSound('success');
                render(); 
            } else {
                playSound('error');
                if(dragEl) { dragEl.classList.add('error-shake'); setTimeout(() => dragEl.classList.remove('error-shake'), 400); }
            }
        }

        function drag(ev) {
            ev.dataTransfer.setData("id", ev.target.id);
            ev.dataTransfer.setData("value", ev.target.getAttribute('data-value'));
            ev.dataTransfer.setData("type", ev.target.getAttribute('data-type'));
        }

        function allowDrop(ev) { ev.preventDefault(); }

        function drop(ev, slotType) {
            ev.preventDefault();
            const id = ev.dataTransfer.getData("id");
            const val = ev.dataTransfer.getData("value");
            const draggedType = ev.dataTransfer.getData("type");

            if (draggedType === slotType && slotType === state.activeSlotType) {
                handleSelection(id.replace('drag-', ''), val, slotType);
            } else {
                playSound('error');
            }
        }

        function checkComplete() {
            const sequence = state.difficulty === 'super-easy' 
                ? ['weekday', 'day', 'month', 'year'] 
                : ['weekday', 'day', 'month', 'year', 'season'];
            return sequence.every(type => state.answers[type] !== null);
        }

        function toggleHint() {
            state.showHint = !state.showHint;
            render();
        }

        function generateOptions(correct, count, type) {
            let options = [correct.toUpperCase()];
            const m = ['GENNAIO', 'FEBBRAIO', 'MARZO', 'APRILE', 'MAGGIO', 'GIUGNO', 'LUGLIO', 'AGOSTO', 'SETTEMBRE', 'OTTOBRE', 'NOVEMBRE', 'DICEMBRE'];
            const w = ['LUNEDÌ', 'MARTEDÌ', 'MERCOLEDÌ', 'GIOVEDÌ', 'VENERDÌ', 'SABATO', 'DOMENICA'];
            
            let pool = [];
            if (type === 'weekday') pool = w;
            else if (type === 'month') pool = m;
            else if (type === 'number') {
                let baseNum = parseInt(correct);
                pool = [];
                for(let i = baseNum - 3; i <= baseNum + 3; i++) {
                    if(i >= 1 && i <= 31) pool.push(i.toString());
                }
            } else if (type === 'year') {
                let baseYear = parseInt(correct);
                pool = [(baseYear - 1).toString(), baseYear.toString(), (baseYear + 1).toString(), (baseYear + 2).toString(), (baseYear - 2).toString()];
            }

            // Filtra l'elemento corretto ed effettua il mischiosicuro senza rischi di loop infinito
            let filtered = shuffle(pool.filter(item => item.toUpperCase() !== correct.toUpperCase()));
            
            for(let i = 0; i < filtered.length && options.length < count; i++) {
                options.push(filtered[i]);
            }
            return shuffle(options);
        }

        function generateCityOptions(correct, count) {
            const list = ['Roma', 'Milano', 'Napoli', 'Venezia', 'Bari', 'Bologna', 'Firenze', 'Aosta', 'Palermo'];
            let opts = [correct];
            if (state.difficulty === 'super-easy') return [correct];

            let filtered = shuffle(list.filter(c => c.toLowerCase() !== correct.toLowerCase()));
            for(let i = 0; i < filtered.length && opts.length < count; i++) {
                opts.push(filtered[i]);
            }
            return shuffle(opts);
        }

        function renderSpatialCity(container) {
            let count = (state.difficulty === 'super-easy') ? 1 : ((state.difficulty === 'advanced') ? 5 : 3);
            const cityOptions = generateCityOptions(state.customCity, count);

            container.innerHTML = `
                <div class="space-y-8 text-center max-w-2xl mx-auto">
                    <div class="bg-blue-50 p-6 rounded-3xl border-4 border-blue-200">
                        <h2 class="text-3xl font-extrabold text-blue-900 uppercase">In quale città ti trovi ora?</h2>
                        <p class="text-lg text-blue-700 mt-2 font-medium">Seleziona il luogo corretto dove ti trovi.</p>
                    </div>
                    <div class="grid gap-4 w-full">
                        ${cityOptions.map(city => {
                            const isCorrect = city.toLowerCase() === state.customCity.toLowerCase();
                            const superEasyHighlight = (state.difficulty === 'super-easy' && isCorrect) ? 'border-amber-500 bg-amber-50 shadow-md animate-pulse' : '';
                            return `
                            <button onclick="checkCity('${city.replace(/'/g, "\\'")}')" id="btn-city-${city.replace(/[^a-zA-Z0-9]/g, '')}" 
                                class="btn-large ${superEasyHighlight} bg-white border-slate-300 p-6 rounded-2xl text-2xl font-black hover:bg-blue-50 uppercase shadow-md w-full">
                                ${city}
                            </button>
                        `}).join('')}
                    </div>
                </div>
            `;
        }

        function checkCity(selected) {
            state.metrics.totalAttempts++;
            const cleanId = `btn-city-${selected.replace(/[^a-zA-Z0-9]/g, '')}`;
            const btn = document.getElementById(cleanId);
            
            if (selected.toLowerCase() === state.customCity.toLowerCase()) {
                if (btn) btn.className = "btn-large bg-green-600 border-green-800 text-white p-6 rounded-2xl text-2xl font-black uppercase shadow-lg w-full";
                playSound('success');
                setTimeout(() => { state.step = 'spatial-room'; render(); }, 1200);
            } else {
                if (btn) { btn.classList.add('error-shake'); setTimeout(() => btn.classList.remove('error-shake'), 400); }
                playSound('error');
            }
        }

        function renderSpatialRoom(container) {
            const isSuperEasy = state.difficulty === 'super-easy';
            container.innerHTML = `
                <div class="space-y-8 text-center max-w-4xl mx-auto">
                    <div class="bg-purple-50 p-6 rounded-3xl border-4 border-purple-200">
                        <h2 class="text-3xl font-extrabold text-purple-900 uppercase">In quale stanza della casa ci si lava i denti?</h2>
                    </div>
                    <div class="${isSuperEasy ? 'flex justify-center' : 'grid md:grid-cols-3'} gap-6">
                        <button onclick="checkRoom('bagno')" id="room-bagno" class="btn-large ${isSuperEasy ? 'border-amber-500 bg-amber-50 w-full max-w-md' : 'border-slate-300 bg-white'} p-8 rounded-3xl flex flex-col items-center shadow-lg hover:bg-indigo-50">
                            <span class="text-7xl mb-4">🛁</span>
                            <span class="text-2xl font-black uppercase">Il Bagno</span>
                        </button>
                        ${!isSuperEasy ? `
                        <button onclick="checkRoom('cucina')" id="room-cucina" class="btn-large border-slate-300 bg-white p-8 rounded-3xl flex flex-col items-center shadow-lg hover:bg-indigo-50">
                            <span class="text-7xl mb-4">🍳</span>
                            <span class="text-2xl font-black uppercase">La Cucina</span>
                        </button>
                        <button onclick="checkRoom('camera')" id="room-camera" class="btn-large border-slate-300 bg-white p-8 rounded-3xl flex flex-col items-center shadow-lg hover:bg-indigo-50">
                            <span class="text-7xl mb-4">🛏️</span>
                            <span class="text-2xl font-black uppercase">La Camera</span>
                        </button>` : ''}
                    </div>
                </div>
            `;
        }

        function checkRoom(room) {
            state.metrics.totalAttempts++;
            const el = document.getElementById(`room-${room}`);
            if (room === 'bagno') {
                el.className = "btn-large bg-green-100 border-green-600 p-8 rounded-3xl flex flex-col items-center shadow-2xl scale-105 transition-all w-full";
                playSound('success');
                setTimeout(() => { state.step = 'spatial-map'; render(); }, 1200);
            } else {
                el.classList.add('error-shake');
                playSound('error');
                setTimeout(() => el.classList.remove('error-shake'), 400);
            }
        }

        function renderSpatialMap(container) {
            const isSuperEasy = state.difficulty === 'super-easy';
            container.innerHTML = `
                <div class="space-y-6 max-w-4xl mx-auto">
                    <div class="bg-orange-50 p-6 rounded-3xl border-4 border-orange-200 text-center">
                        <h2 class="text-3xl font-extrabold text-orange-900 uppercase">Mappa della casa</h2>
                        <p class="text-lg text-orange-700 font-medium">Trascina o tocca l'icona <span class="bg-white px-2 rounded-lg border-2 font-black">TU 📍</span> e portala in <strong>CUCINA</strong>.</p>
                    </div>
                    <div class="relative bg-slate-100 rounded-[3rem] p-4 w-full h-[400px] shadow-inner border-8 border-slate-200 overflow-hidden">
                        <div class="absolute inset-0 grid grid-cols-2 grid-rows-2 gap-4 p-4">
                            <div class="bg-slate-200 rounded-3xl flex items-center justify-center text-slate-400 font-black uppercase text-xl">Bagno</div>
                            <div id="target-kitchen" ondrop="dropMap(event)" ondragover="allowDrop(event)" onclick="moveMap()"
                                 class="bg-orange-100 border-4 ${isSuperEasy ? 'border-amber-500 border-solid bg-amber-50 animate-pulse' : 'border-dashed border-orange-400'} rounded-3xl flex flex-col items-center justify-center text-orange-600 font-black text-2xl uppercase cursor-pointer hover:bg-orange-200 transition-colors">
                                CUCINA
                            </div>
                            <div class="bg-slate-200 rounded-3xl flex items-center justify-center text-slate-400 font-black uppercase text-xl">Soggiorno</div>
                            <div class="bg-slate-200 rounded-3xl flex items-center justify-center text-slate-400 font-black uppercase text-xl">Camera</div>
                        </div>
                        <div id="user-avatar" draggable="true" ondragstart="drag(event)" data-value="tu" onclick="moveMap()"
                             class="absolute bottom-10 right-10 bg-white text-indigo-700 w-24 h-24 flex flex-col items-center justify-center rounded-full shadow-2xl cursor-move z-10 border-4 border-indigo-600 font-black hover:scale-105 transition-transform">
                             <span class="text-3xl animate-bounce">📍</span> TU
                        </div>
                    </div>
                </div>
            `;
        }

        function dropMap(ev) {
            ev.preventDefault();
            if (ev.dataTransfer.getData("value") === 'tu') moveMap();
        }

        function moveMap() {
            state.metrics.totalAttempts++;
            const target = document.getElementById('target-kitchen');
            target.innerHTML = "ECCELLENTE!";
            target.className = "bg-green-600 rounded-3xl flex items-center justify-center text-white font-black text-3xl animate-pulse";
            document.getElementById('user-avatar').style.display = 'none';
            playSound('success');
            setTimeout(() => { state.step = 'final'; render(); }, 1500);
        }

        async function salvaRisultatiFirebase() {
            const numeroTotaleDomande = state.difficulty === 'super-easy' ? 7 : 8; 
            const accuratezzaPercentuale = Math.max(10, Math.min(100, Math.round((numeroTotaleDomande / state.metrics.totalAttempts) * 100)));
            const tempoImpiegatoInSecondi = Math.round((Date.now() - state.metrics.startTime) / 1000);
            const punteggioGrezzoGenerale = Math.max(0, numeroTotaleDomande * 10 - (state.metrics.totalAttempts - numeroTotaleDomande) * 2);

            const datiEsercizio = {
                titolo: "Orientamento Cognitivo",
                risultati: {
                    risposteCorrette: numeroTotaleDomande,
                    totaleDomande: numeroTotaleDomande,
                    percentualeAccuratezza: accuratezzaPercentuale,
                    tempoMedioS: tempoImpiegatoInSecondi,
                    punteggio: punteggioGrezzoGenerale
                }
            };

            const statusEl = document.getElementById('fb-save-status');
            if (statusEl) {
                statusEl.textContent = "Salvataggio nel database cloud in corso...";
                statusEl.className = "text-sm text-amber-600 font-bold block animate-pulse";
            }

            const urlParams = new URLSearchParams(window.location.search);
            const isSessioneActive = urlParams.get('sessione') === 'true';
            const urlPazienteId = urlParams.get('pazienteId') || urlParams.get('userId');
            const sessionId = urlParams.get('sessionId');

            let patientId = urlPazienteId || (window.currentUser ? window.currentUser.uid : 'anon-paziente');
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'mente-attiva';

            if (!window.dbReady || !window.db) {
                if (statusEl) {
                    statusEl.textContent = "Salvato in locale (Modalità Offline).";
                    statusEl.className = "text-sm text-green-600 font-bold block";
                }
                return;
            }

            try {
                if (isSessioneActive && sessionId) {
                    const sessionDocRef = window.doc(window.db, 'artifacts', appId, 'users', patientId, 'sessioni', sessionId);
                    const sessionDoc = await window.getDoc(sessionDocRef);

                    if (sessionDoc.exists()) {
                        const sessionData = sessionDoc.data();
                        let esercizi = sessionData.esercizi || [];
                        let updated = false;

                        for (let i = 0; i < esercizi.length; i++) {
                            if (esercizi[i].titolo === "Orientamento Cognitivo" && !esercizi[i].completato) {
                                esercizi[i].risultati = datiEsercizio.risultati;
                                esercizi[i].completato = true;
                                updated = true;
                                break;
                            }
                        }
                        if (!updated) {
                            esercizi.push({ ...datiEsercizio, completato: true, dataCompletamento: new Date().toISOString() });
                        }
                        await window.updateDoc(sessionDocRef, { esercizi: esercizi });
                    }
                } else {
                    const historyColRef = window.collection(window.db, 'artifacts', appId, 'users', patientId, 'storico_esercizi');
                    await window.addDoc(historyColRef, { ...datiEsercizio, dataCompletamento: new Date().toISOString() });
                }

                if (statusEl) {
                    statusEl.textContent = "Risultati salvati correttamente nel cloud!";
                    statusEl.className = "text-sm text-green-600 font-bold block";
                }
            } catch (error) {
                console.error("Errore salvataggio Firebase:", error);
                if (statusEl) {
                    statusEl.textContent = "Continuazione consentita (Errore salvataggio Cloud).";
                    statusEl.className = "text-sm text-amber-600 font-bold block";
                }
            }
        }

        function reindirizzaHub() {
            const urlParams = new URLSearchParams(window.location.search);
            const patientId = urlParams.get('pazienteId') || urlParams.get('userId') || '';
            const sessionId = urlParams.get('sessionId') || '';
            window.location.href = `esercizio.html?file=Orientamento%2520temporale-spaziale.html&pazienteId=${patientId}&sessionId=${sessionId}`;
        }

        function renderFinal(container) {
            playSound('victory'); 
            container.innerHTML = `
                <div class="text-center py-12 px-6 bg-white rounded-[4rem] shadow-2xl border-b-8 border-green-600 mt-6 max-w-2xl mx-auto space-y-6">
                    <span class="text-8xl block mb-2">🏆</span>
                    <h2 class="text-4xl font-black text-green-700 uppercase">Ottimo lavoro!</h2>
                    <p class="text-2xl text-slate-700 leading-relaxed font-medium">
                        Ti sei orientato perfettamente.<br>Hai completato tutti gli esercizi con successo.
                    </p>
                    <div class="bg-slate-50 p-4 rounded-3xl border border-slate-200">
                        <span id="fb-save-status" class="text-sm text-slate-500 font-bold block">In attesa del salvataggio dei dati...</span>
                    </div>
                    <div class="flex flex-col sm:flex-row justify-center gap-4 pt-4">
                        <button onclick="reindirizzaHub()" class="btn-large flex-1 bg-green-600 border-green-800 hover:bg-green-700 text-white py-5 px-6 rounded-full text-xl font-black shadow-xl uppercase">
                            Prosegui Sessione
                        </button>
                        <button onclick="resetApp()" class="btn-large flex-1 bg-indigo-600 border-indigo-800 hover:bg-indigo-700 text-white py-5 px-6 rounded-full text-xl font-black shadow-xl uppercase">
                            Ricomincia
                        </button>
                    </div>
                </div>
            `;
            salvaRisultatiFirebase();
        }

        function resetApp() {
            state.step = 'difficulty';
            state.answers = { weekday: null, day: null, month: null, year: null, season: null };
            state.metrics = { startTime: null, totalAttempts: 0 };
            render();
        }

        function shuffle(array) { 
            return array.sort(() => Math.random() - 0.5); 
        }

        window.onload = async function() {
            render();
            await detectLocation();
        };
    </script>
</body>
</html>
