<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sessione Completata! | MindGym</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            --slate-900: #0f172a;
            --slate-700: #334155;
            --slate-100: #f1f5f9;
            --success: #10b981;
            --shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body {
            background: var(--primary-gradient);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
        }

        .summary-card {
            background: white;
            color: var(--slate-900);
            max-width: 600px;
            width: 100%;
            border-radius: 32px;
            padding: 45px 35px;
            box-shadow: var(--shadow);
            text-align: center;
            animation: scaleUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes scaleUp {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .trophy-icon {
            font-size: 4.5rem;
            color: #f59e0b;
            margin-bottom: 20px;
            animation: totalBounce 2s infinite;
        }

        @keyframes totalBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .summary-card h1 {
            font-size: 2.2rem;
            font-weight: 800;
            color: var(--slate-900);
            margin-bottom: 10px;
        }

        /* --- IL TUO MESSAGGIO MOTIVAZIONALE --- */
        .motivation-box {
            background: #ecfdf5;
            border-left: 5px solid var(--success);
            padding: 20px;
            border-radius: 16px;
            margin: 25px 0;
            text-align: left;
        }
        .motivation-box p {
            color: #065f46;
            font-size: 1.05rem;
            line-height: 1.6;
            font-weight: 500;
        }

        /* --- STATISTICHE DELLA SESSIONE --- */
        .stats-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-item {
            background: var(--slate-100);
            padding: 15px;
            border-radius: 14px;
        }
        .stat-item span {
            display: block;
            font-size: 0.85rem;
            color: var(--slate-700);
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .stat-item strong {
            font-size: 1.4rem;
            color: var(--slate-900);
        }

        .btn-home {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
            border: none;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 16px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 20px -3px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>

    <div class="summary-card">
        <div class="trophy-icon"><i class="fa-solid fa-award"></i></div>
        <h1 id="welcome-back">Ottimo lavoro!</h1>
        
        <!-- Contatori dinamici estratti dal LocalStorage -->
        <div class="stats-row">
            <div class="stat-item">
                <span>Attività Svolte</span>
                <strong id="res-count">0</strong>
            </div>
            <div class="stat-item">
                <span>Media Punteggi</span>
                <strong id="res-score">0%</strong>
            </div>
        </div>

        <!-- Box motivazionale richiesto -->
        <div class="motivation-box">
            <p>
                <i class="fa-solid fa-circle-check" style="margin-right: 8px;"></i>
                <strong>La costanza è il segreto</strong> per mantenere la mente giovane, elastica ed in salute. Continuando a stimolare le tue funzioni cognitive giorno dopo giorno, costruisci una riserva cerebrale più forte! Ti aspettiamo domani per una nuova sessione.
            </p>
        </div>

        <button class="btn-home" onclick="TornaAllaLanding()">Torna alla Home</button>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const username = localStorage.getItem('hub_username') || "Utente";
            const cronologia = JSON.parse(localStorage.getItem('free_exercises_history')) || [];
            
            document.getElementById('welcome-back').innerText = `Ottimo lavoro, ${username}!`;
            document.getElementById('res-count').innerText = cronologia.length;

            if(cronologia.length > 0) {
                const somma = cronologia.reduce((acc, item) => acc + item.punteggio, 0);
                const media = Math.round(somma / cronologia.length);
                document.getElementById('res-score').innerText = `${media}%`;
            } else {
                document.getElementById('res-score').innerText = `N/D`;
            }
        });

        function TornaAllaLanding() {
            // Pulisce la sessione e torna alla pagina di scelta iniziale
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
