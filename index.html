<!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, get, set, update, push } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBChH3sFfhwE4waQTzERtKGytJrucYEFM",
            authDomain: "hub-di-stimolazione-cognitiva.firebaseapp.com",
            databaseURL: "https://hub-di-stimolazione-cognitiva-default-rtdb.firebaseio.com",
            projectId: "hub-di-stimolazione-cognitiva",
            storageBucket: "hub-di-stimolazione-cognitiva.firebasestorage.app",
            messagingSenderId: "593673504352",
            appId: "1:593673504352:web:9d4a194109ec7061e6e505",
            measurementId: "G-6JTPBYQYPE"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeSession = null;
        let isSessionPianificata = false;
        let sessionDataToSave = null;

        window.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const fileDirect = params.get('file');
            const localUsername = localStorage.getItem('hub_username') || "Utente";

            // Se è stato passato un file direttamente nell'URL (Esercizio Singolo / Libero)
            if (fileDirect) {
                const esFile = decodeURIComponent(fileDirect);
                document.getElementById('exercise-iframe').src = esFile;
                document.getElementById('exercise-title').textContent = `${localUsername} ➔ Esercizio`;
                document.getElementById('next-exercise-btn').innerHTML = '<i class="fa-solid fa-list"></i> Scegli Altro Esercizio';
                return; // Interrompiamo qui per evitare qualsiasi controllo Firebase non necessario che provochi il loop
            }

            // Altrimenti controlliamo se c'è una sessione attiva da database
            try {
                const sessionRef = ref(db, 'sessione_attiva');
                const snapshot = await get(sessionRef);

                if (snapshot.exists()) {
                    activeSession = snapshot.val();
                    
                    if (activeSession.tipo === 'libera') {
                        document.getElementById('exercise-iframe').style.display = "none";
                        document.getElementById('exercise-title').textContent = `Paziente: ${activeSession.pazienteNome}`;
                        document.getElementById('next-exercise-btn').innerHTML = '<i class="fa-solid fa-list"></i> Scegli Altro Esercizio';
                    } else {
                        isSessionPianificata = true;
                        loadCurrentExerciseFromSession();
                    }
                } else {
                    // Nessuna sessione attiva e nessun file specificato: torniamo alla home in modo sicuro
                    window.location.href = "index.html";
                }
            } catch (error) {
                console.error("Errore di connessione a Firebase:", error);
                window.location.href = "index.html";
            }
        });

        function loadCurrentExerciseFromSession() {
            const index = activeSession.indiceCorrente;
            const esercizi = activeSession.esercizi;

            if (esercizi && index < esercizi.length) {
                const esercizioAttivo = esercizi[index];
                document.getElementById('exercise-iframe').src = esercizioAttivo.file;
                document.getElementById('exercise-title').textContent = `${activeSession.pazienteNome} ➔ Esercizio ${index + 1} di ${esercizi.length}: ${esercizioTesto(esercizioAttivo.titolo)}`;
            } else {
                showFinalResultsScreen("Sessione Pianificata Completa", activeSession.esercizi);
            }
        }

        function esercizioTesto(t) {
            return t || "Esercizio";
        }

        window.nextExercise = async function() {
            if (activeSession && activeSession.tipo !== 'libera') {
                const index = activeSession.indiceCorrente;
                const sessionRef = ref(db, 'sessione_attiva');
                const nuovoIndice = index + 1;
                
                await update(sessionRef, {
                    indiceCorrente: nuovoIndice
                });

                activeSession.indiceCorrente = nuovoIndice;
                loadCurrentExerciseFromSession();
            } else {
                // In modalità libera, riporta alla lista degli esercizi senza ricaricare in loop
                window.location.href = "esercizi.html";
            }
        }

        window.requestEndSession = async function() {
            if (!activeSession) {
                let fatti = parseInt(localStorage.getItem('exercises_done_counter') || '0');
                localStorage.setItem('exercises_done_counter', (fatti + 1).toString());
                
                const params = new URLSearchParams(window.location.search);
                const fileDirect = params.get('file');
                const esTitle = fileDirect ? decodeURIComponent(fileDirect).replace('.html', '').replace(/_/g, ' ') : "Esercizio Singolo";
                
                showFinalResultsScreen("Esercizio Libero", [{ titolo: esTitle, file: fileDirect || "" }]);
                return;
            }

            if (activeSession.tipo === 'libera') {
                showFinalResultsScreen("Esercizio Libero", [{ titolo: activeSession.pazienteNome, file: "" }]);
            } else if (isSessionPianificata) {
                const completati = activeSession.esercizi.slice(0, activeSession.indiceCorrente + 1);
                showFinalResultsScreen("Sessione Pianificata Interrotta", completati.length > 0 ? completati : [{titolo: "Nessun esercizio completato", file: ""}]);
            }
        }

        function showFinalResultsScreen(tipoSessione, eserciziSvoltiList) {
            document.getElementById('exercise-iframe').style.display = "none";
            document.getElementById('top-bar').style.display = "none";
            
            const resultsScreen = document.getElementById('results-screen');
            resultsScreen.style.display = "flex";
            
            const nomePaz = activeSession ? activeSession.pazienteNome : (localStorage.getItem('hub_username') || "Utente");
            document.getElementById('paziente-concluso').textContent = `Paziente / Utente: ${nomePaz}`;
            
            const list = document.getElementById('final-stats');
            list.innerHTML = "";
            
            eserciziSvoltiList.forEach((es) => {
                const li = document.createElement('li');
                li.innerHTML = `<span><i class="fa-solid fa-check" style="color: #10b981;"></i> ${es.titolo || "Esercizio"}</span> <span style="font-weight: bold; color: #10b981;">Completato</span>`;
                list.appendChild(li);
            });

            sessionDataToSave = {
                pazienteId: activeSession ? activeSession.pazienteId : "utente_singolo",
                data: new Date().toISOString(),
                tipo: tipoSessione,
                eserciziSvolti: eserciziSvoltiList
            };
        }

        window.concludiESalvaFeedback = async function() {
            const feedbackValues = {};
            document.querySelectorAll('.star-rating').forEach(group => {
                const paramName = group.getAttribute('data-param');
                const checkedInput = group.querySelector('input:checked');
                feedbackValues[paramName] = checkedInput ? parseInt(checkedInput.value) : null;
            });

            if (sessionDataToSave) {
                sessionDataToSave.feedback = feedbackValues;
                const targetId = sessionDataToSave.pazienteId;

                const storicoRef = ref(db, `storico_pazienti/${targetId}/sessioni`);
                await push(storicoRef, sessionDataToSave);

                if (activeSession) {
                    await set(ref(db, 'sessione_attiva'), null);
                }
            }

            window.location.href = "index.html";
        }
    </script>
