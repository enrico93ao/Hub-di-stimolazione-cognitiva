<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Clinica - Risultati Esercizi</title>
    
    <!-- Libreria Chart.js per i grafici -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- TailwindCSS per un design pulito e moderno dell'interfaccia -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 p-6 md:p-10">

    <div class="max-w-5xl mx-auto bg-white rounded-2xl shadow-sm border border-slate-200 p-6 md:p-8">
        
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-slate-800">Andamento Cognitivo Paziente</h1>
            <p class="text-slate-500 text-sm mt-1">Report visivo dell'accuratezza degli esercizi nel tempo</p>
        </header>

        <!-- Contenitore del grafico -->
        <div class="relative w-full" style="height: 450px;">
            <canvas id="performanceChart"></canvas>
        </div>

    </div>

    <script type="module">
        let performanceChartInstance = null;

        // Nuova Palette di Colori Clinica
        const colorPalette = [
            '#3b82f6', // Blu brillante (Es. Attenzione)
            '#10b981', // Smeraldo (Es. Memoria)
            '#f59e0b', // Ambra (Es. Funzioni Esecutive)
            '#8b5cf6', // Viola (Es. Linguaggio)
            '#ec4899'  // Rosa
        ];
        
        const exerciseColors = {};
        
        function getColorForExercise(exerciseTitle) {
            if (!exerciseColors[exerciseTitle]) {
                const index = Object.keys(exerciseColors).length % colorPalette.length;
                exerciseColors[exerciseTitle] = colorPalette[index];
            }
            return exerciseColors[exerciseTitle];
        }

        // FUNZIONE RENDER CHART AGGIORNATA
        window.renderChart = function(labels, datasets) {
            const canvas = document.getElementById('performanceChart');
            if (!canvas) return;
            
            const ctx = canvas.getContext('2d');
            
            if (performanceChartInstance) {
                performanceChartInstance.destroy();
            }

            // Applichiamo miglioramenti grafici ad ogni dataset
            const polishedDatasets = datasets.map(dataset => {
                return {
                    ...dataset,
                    tension: 0.35,              // Linee curve e morbide
                    borderWidth: 3,             // Spessore linea
                    pointRadius: 6,             // Dimensione punto
                    pointHoverRadius: 9,        // Dimensione punto al passaggio mouse
                    pointBackgroundColor: dataset.borderColor, 
                    pointBorderColor: '#ffffff', // Bordo bianco del punto
                    pointBorderWidth: 2,        
                    pointHoverBorderWidth: 3,
                };
            });

            performanceChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: polishedDatasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'nearest',
                        intersect: false,
                    },
                    plugins: {
                        legend: {
                            display: true,
                            position: 'bottom',
                            labels: {
                                usePointStyle: true, // Legenda con cerchi
                                pointStyle: 'circle',
                                padding: 25,
                                font: {
                                    family: "'Segoe UI', system-ui, sans-serif",
                                    size: 13,
                                    weight: '600'
                                },
                                color: '#475569'
                            }
                        },
                        tooltip: {
                            backgroundColor: '#1e293b', 
                            titleColor: '#ffffff',
                            bodyColor: '#e2e8f0',
                            titleFont: { size: 13, weight: 'bold' },
                            bodyFont: { size: 12 },
                            padding: 12,
                            cornerRadius: 8, 
                            displayColors: true,
                            boxWidth: 8,
                            boxHeight: 8,
                            callbacks: {
                                label: function(context) {
                                    return ` ${context.dataset.label}: ${context.raw.y || context.raw}% accuratezza`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: {
                            min: 0,
                            max: 100,
                            border: { display: false },
                            ticks: {
                                callback: function(value) { return value + "%"; },
                                font: { size: 11, weight: '500' },
                                color: '#64748b',
                                stepSize: 20
                            },
                            title: {
                                display: true,
                                text: 'Accuratezza',
                                color: '#94a3b8',
                                font: { size: 12, weight: '600' }
                            },
                            grid: {
                                color: '#f1f5f9', 
                                tickBorderDash: [5, 5], 
                                drawTicks: false
                            }
                        },
                        x: {
                            border: { display: false },
                            ticks: {
                                font: { size: 12 },
                                color: '#64748b'
                            },
                            grid: {
                                display: false 
                            }
                        }
                    }
                }
            });
        };

        // --- DATI DI ESEMPIO PER MOSTRARE SUBITO IL GRAFICO ---
        // Se nel tuo codice hai già una funzione che carica i dati, 
        // puoi rimuovere questa parte, altrimenti lasciala per vedere l'effetto.
        document.addEventListener('DOMContentLoaded', () => {
            const dateLabels = ['Settimana 1', 'Settimana 2', 'Settimana 3', 'Settimana 4', 'Settimana 5', 'Settimana 6'];
            
            const mockData = [
                {
                    label: 'Memoria di Lavoro',
                    borderColor: getColorForExercise('Memoria di Lavoro'),
                    data: [45, 50, 55, 68, 72, 85]
                },
                {
                    label: 'Attenzione Selettiva',
                    borderColor: getColorForExercise('Attenzione Selettiva'),
                    data: [60, 62, 58, 70, 80, 88]
                },
                {
                    label: 'Funzioni Esecutive',
                    borderColor: getColorForExercise('Funzioni Esecutive'),
                    data: [30, 35, 45, 50, 65, 75]
                }
            ];

            // Avvia la renderizzazione
            window.renderChart(dateLabels, mockData);
        });

    </script>
</body>
</html>
